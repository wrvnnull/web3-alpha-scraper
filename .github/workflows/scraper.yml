# .github/workflows/scraper.yml
#
# This workflow runs the Web3 Alpha Scraper on a schedule (every 4 hours)
# and commits any changes to data/seen.json back to the repo so that
# deduplication state persists across runs.
#
# HOW STATE PERSISTENCE WORKS:
# After each run, seen.json might have new entries (projects we just found).
# We commit that file back to the repo. On the next run, the updated file
# is checked out, so we never re-notify about already-seen projects.
# Think of it like a stateful cron job — the git repo IS the database.
#
# REQUIRED SECRETS (set in Settings → Secrets → Actions):
#   TELEGRAM_BOT_TOKEN   — from @BotFather on Telegram
#   TELEGRAM_CHAT_ID     — your Telegram user or group chat ID
#   GITHUB_TOKEN         — automatically provided by GitHub Actions (read/write)
#   GH_PAT               — Personal Access Token with repo scope (for GitHub search API)
#
# OPTIONAL SECRETS:
#   TWITTER_BEARER_TOKEN — Twitter API v2 bearer token (for official API mode)

name: Web3 Alpha Scraper

on:
  schedule:
    # Runs every 4 hours — cron syntax: minute hour day month weekday
    # These times hit: 00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC
    - cron: "0 */4 * * *"

  # Also allow manual triggering from the GitHub Actions UI
  # This is useful for testing or on-demand runs
  workflow_dispatch:
    inputs:
      source:
        description: "Specific source to run (leave empty to run all)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - airdrop
          - defillama
          - coingecko
          - news
          - github
          - twitter
      dry_run:
        description: "Dry run (no Telegram notifications)"
        required: false
        default: false
        type: boolean

jobs:
  scrape:
    name: "Scrape Web3 Alpha Sources"
    runs-on: ubuntu-latest
    timeout-minutes: 30     # Kill the job if it runs too long (safety net)

    # Grant write permission to push the updated seen.json back
    permissions:
      contents: write

    steps:
      # ── Step 1: Check out the repo (including the latest seen.json) ──
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use a PAT so the bot commit can trigger other workflows if needed
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1   # Shallow clone — we only need the latest commit

      # ── Step 2: Set up Python ──────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"    # Cache pip dependencies between runs for speed

      # ── Step 3: Install dependencies ──────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Step 4: Ensure data directory exists ──────────────────────
      - name: Ensure data/seen.json exists
        run: |
          mkdir -p data
          if [ ! -f data/seen.json ]; then
            echo "{}" > data/seen.json
            echo "Created fresh data/seen.json"
          else
            echo "Using existing data/seen.json ($(wc -c < data/seen.json) bytes)"
          fi

      # ── Step 5: Run the scraper ────────────────────────────────────
      - name: Run scraper
        env:
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN:         ${{ secrets.GH_PAT }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
        run: |
          # Build the command based on manual trigger inputs
          CMD="python main.py"

          # Append --source flag if a specific source was chosen
          if [ -n "${{ github.event.inputs.source }}" ]; then
            CMD="$CMD --source ${{ github.event.inputs.source }}"
          fi

          # Append --dry-run flag if selected
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            CMD="$CMD --dry-run"
          fi

          echo "Running: $CMD"
          $CMD

      # ── Step 6: Commit updated seen.json back to the repo ─────────
      # This is what makes the deduplication stateful across runs.
      # If seen.json didn't change (no new projects), git will not
      # create a commit — the 'nothing to commit' check handles this.
      - name: Commit updated seen.json
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name  "web3-alpha-bot"

          git add data/seen.json

          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to seen.json — nothing to commit"
          else
            TIMESTAMP=$(date -u "+%Y-%m-%d %H:%M UTC")
            git commit -m "chore: update seen.json [$TIMESTAMP]"
            git push
            echo "✅ Pushed updated seen.json"
          fi

      # ── Step 7: Upload run logs as artifact (for debugging) ───────
      - name: Save run summary
        if: always()    # Run even if the scraper step failed
        run: |
          mkdir -p .run-logs
          echo "Run completed at $(date -u)" > .run-logs/summary.txt
          echo "Trigger: ${{ github.event_name }}" >> .run-logs/summary.txt
